kube-prometheus-stack:

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    enabled: true
    replicas: 1

    # Pull admin credentials from the SealedSecret
    admin:
      existingSecret: grafana-admin-secret
      userKey: admin-user
      passwordKey: admin-password

    # Longhorn persistent storage
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 5Gi
      accessModes:
        - ReadWriteOnce

    # Disable the built-in ingress — we manage it ourselves via IngressRoute
    ingress:
      enabled: false

    # Grafana config
    grafana.ini:
      server:
        root_url: https://grafana.phink8s.com   # ← replace with your domain
        serve_from_sub_path: false
      auth:
        disable_login_form: false
      security:
        allow_embedding: true

    # Pre-load useful dashboards from grafana.com
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource: Prometheus
        longhorn:
          gnetId: 16888
          revision: 11
          datasource: Prometheus
        traefik:
          gnetId: 17347
          revision: 9
          datasource: Prometheus
    
    plugins: [] 

    # Tolerations for Talos nodes if needed
    tolerations: []
    nodeSelector: {}

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    enabled: true

    prometheusSpec:
      # Longhorn persistent storage
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi

      # Retention
      retention: 30d
      retentionSize: "10GB"

      # Watch ALL namespaces for ServiceMonitors/PodMonitors
      # Remove the namespace selectors to scrape everything
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false

      # Resource limits
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

      # Talos-specific: some paths differ
      # Uncomment if you want to scrape Talos API server metrics
      additionalScrapeConfigs: []

    ingress:
      enabled: false   # managed via IngressRoute below

  # ── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    enabled: true

    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    ingress:
      enabled: false

  # ── Node Exporter ─────────────────────────────────────────────────────────
  nodeExporter:
    enabled: true

  prometheus-node-exporter:
    # Talos mounts host paths differently — these tolerations ensure it runs on all nodes
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    # Talos-specific host path mounts
    extraArgs:
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$

  # ── kube-state-metrics ───────────────────────────────────────────────────
  kubeStateMetrics:
    enabled: true

  # ── Talos-specific component toggles ─────────────────────────────────────
  # Talos uses different paths for etcd, controller-manager, scheduler
  kubeEtcd:
    enabled: true
    endpoints: []   # Talos exposes etcd metrics differently; leave empty or add your control plane IPs
    service:
      enabled: true
      port: 2381
      targetPort: 2381

  kubeControllerManager:
    enabled: true
    endpoints: []   # Add your control plane node IPs here if metrics aren't auto-discovered
    service:
      enabled: true
      port: 10257
      targetPort: 10257

  kubeScheduler:
    enabled: true
    endpoints: []
    service:
      enabled: true
      port: 10259
      targetPort: 10259

  kubeProxy:
    enabled: false   # Talos uses kube-proxy-less networking (typically)

  # ── CRDs ─────────────────────────────────────────────────────────────────
  crds:
    enabled: true
    upgradeJob:
      enabled: true

  # ── Default alert rules ──────────────────────────────────────────────────
  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: true
      configReloaders: true
      general: true
      k8sContainerCpuUsageSecondsTotal: true
      k8sContainerMemoryCache: true
      k8sContainerMemoryRss: true
      k8sContainerMemorySwap: true
      k8sContainerResource: true
      k8sPodOwner: true
      kubeApiserverAvailability: true
      kubeApiserverBurnrate: true
      kubeApiserverHistogram: true
      kubeApiserverSlos: true
      kubeControllerManager: true
      kubelet: true
      kubeProxy: false   # off since kubeProxy disabled
      kubePrometheusGeneral: true
      kubePrometheusNodeRecording: true
      kubernetesApps: true
      kubernetesResources: true
      kubernetesStorage: true
      kubernetesSystem: true
      kubeSchedulerAlerting: true
      kubeSchedulerRecording: true
      kubeStateMetrics: true
      network: true
      node: true
      nodeExporterAlerting: true
      nodeExporterRecording: true
      prometheus: true
      prometheusOperator: true
      windows: false