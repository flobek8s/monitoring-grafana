apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: monitoring-grafana
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`alertmanager.phink8s.com`)
      kind: Rule
      middlewares:
        - name: basic-auth-prometheus
          namespace: monitoring-grafana
      services:
        - name: monitoring-grafana-kube-pr-alertmanager
          port: 9093
  tls:
    secretName: wildcard-phink8s.com-tls